<!DOCTYPE html>
<html>
<head>

<title>Currency Analyzer AI</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364);
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
color:#333;
}

.container{

background:white;
padding:40px;
width:520px;
border-radius:15px;
box-shadow:0px 10px 40px rgba(0,0,0,0.3);
text-align:center;

}

h1{
margin-bottom:25px;
}

.upload-area{

border:2px dashed #bbb;
padding:25px;
border-radius:10px;
cursor:pointer;

}

.upload-area:hover{
border-color:#007bff;
}

button{

margin-top:20px;
padding:12px 35px;
background:#007bff;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#0056b3;
}

.preview{

margin-top:20px;
max-width:300px;
border-radius:10px;

}

.result{

margin-top:25px;
font-size:18px;

}

.real{
color:green;
font-weight:bold;
}

.fake{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Currency Analyzer AI</h1>

<div class="upload-area">

<input type="file" id="imageInput">

</div>

<img id="preview" class="preview" style="display:none">

<br>

<button onclick="detectCurrency()">Analyze Currency</button>

<div class="result" id="result"></div>

</div>

<script>

document.getElementById("imageInput").addEventListener("change", function(){

const file=this.files[0]

const preview=document.getElementById("preview")

preview.src=URL.createObjectURL(file)

preview.style.display="block"

})

async function detectCurrency(){

const fileInput=document.getElementById("imageInput")

const formData=new FormData()

formData.append("file", fileInput.files[0])

const response=await fetch("/detect",{
method:"POST",
body:formData
})

const data=await response.json()

let statusClass=data.status==="Real" ? "real" : "fake"

document.getElementById("result").innerHTML=

"Currency: "+data.currency+
"<br>Status: <span class='"+statusClass+"'>"+data.status+"</span>"+
"<br>1 "+data.currency+" ≈ "+data.inr_value.toFixed(2)+" INR"

}

</script>

</body>
</html>
